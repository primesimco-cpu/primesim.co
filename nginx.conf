# /etc/nginx/sites-available/primesimobile.conf
# Kendi sunucu kullanıyorsanız bu config'i kullanın

# ── HTTPS Redirect ──────────────────────────────────────
server {
    listen 80;
    server_name app.primesimobile.com admin.primesimobile.com api.primesimobile.com;
    return 301 https://$host$request_uri;
}

# ── app.primesimobile.com → SuperApp (Next.js :3000) ────
server {
    listen 443 ssl http2;
    server_name app.primesimobile.com;

    ssl_certificate /etc/letsencrypt/live/primesimobile.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/primesimobile.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets cache
    location /_next/static {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── admin.primesimobile.com → Admin Panel (:3001) ───────
server {
    listen 443 ssl http2;
    server_name admin.primesimobile.com;

    ssl_certificate /etc/letsencrypt/live/primesimobile.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/primesimobile.com/privkey.pem;

    # IP Whitelist (opsiyonel ama önerilen)
    # allow 1.2.3.4;  # Kendi IP'niz
    # deny all;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── api.primesimobile.com → REST API (:8080) ────────────
server {
    listen 443 ssl http2;
    server_name api.primesimobile.com;

    ssl_certificate /etc/letsencrypt/live/primesimobile.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/primesimobile.com/privkey.pem;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # CORS
        add_header Access-Control-Allow-Origin "https://app.primesimobile.com";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Stripe webhook — no rate limit
    location /stripe/webhook {
        limit_req off;
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:8080;
        access_log off;
    }
}
